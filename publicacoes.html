<!DOCTYPE html>
<html lang="pt-br" class="scroll-smooth">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gaming Teacher - Publicações</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Urbanist:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Urbanist', 'sans-serif'],
                    },
                    colors: {
                        red: '#D94C50',
                        grey: '#343434',
                        white: '#F2F2F2',
                        green: '#2ABD51',
                    }
                }
            }
        }
    </script>
</head>

<body class="bg-white text-grey font-sans">
    <div id="content-wrapper" class="min-h-screen flex flex-col">
        <main class="flex-1 flex items-center">
            <div class="max-w-6xl mx-auto p-4 w-full">
                <div class="flex flex-col md:flex-row gap-6 items-stretch">
                    <!-- Sidebar will be loaded here -->
                    <div id="sidebar-container" class="md:w-5/12 lg:w-4/12"></div>

                    <!-- Right: tabbed content -->
                    <section class="relative md:w-7/12 lg:w-8/12">
                        <div class="w-full md:w-auto mx-auto">
                            <!-- Navigation -->
                            <div class="mb-3">
                                <div class="w-full bg-white/80 backdrop-blur rounded-full shadow-md border flex justify-center gap-2 md:gap-6 px-2 md:px-4 py-1">
                                    <a href="index.html" class="text-base md:text-lg font-bold py-2 px-3 md:px-4 border-b-2 border-transparent text-grey hover:border-red hover:text-red">Gaming Teacher</a>
                                    <a href="sobre.html" class="text-base md:text-lg font-bold py-2 px-3 md:px-4 border-b-2 border-transparent text-grey hover:border-red hover:text-red">Sobre</a>
                                    <a href="publicacoes.html" class="text-base md:text-lg font-bold py-2 px-3 md:px-4 border-b-2 border-red text-red">Publicações</a>
                                    <a href="links.html" class="text-base md:text-lg font-bold py-2 px-3 md:px-4 border-b-2 border-transparent text-grey hover:border-red hover:text-red">Links</a>
                                </div>
                            </div>
                            
                            <!-- Content panel -->
                            <div class="w-full bg-white/80 text-grey rounded-3xl shadow-lg backdrop-blur-lg p-6 md:p-10 md:h-[520px] min-h-[380px] overflow-y-auto">
                                <h2 class="text-3xl md:text-4xl font-bold mb-6 text-red">Publicações e Destaques</h2>

                                <!-- Grid dinâmico de publicações -->
                                <div id="pub-grid" class="grid grid-cols-2 md:grid-cols-3 gap-4"></div>

                                <!-- Detalhes dinâmicos -->
                                <div id="pub-details"></div>
                            </div>
                        </div>
                    </section>
                </div>
            </div>
        </main>

        <!-- Footer -->
        <footer class="bg-black/80 text-white text-center py-4 mt-auto">
            <div class="container mx-auto px-6">
                <p>&copy; 2025 Carlos Henrique Valadares. Todos os direitos reservados.</p>
            </div>
        </footer>
    </div>
    <script src="navigation.js"></script>
    <script src="publications.js"></script>
    <style>
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .animate-fadeIn {
            animation: fadeIn 0.3s ease-out;
        }
    </style>
</body>

</html>
